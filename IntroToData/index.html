<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apriori Algorithm Dashboard</title>
    
    <!-- โหลด React และ Babel ผ่าน CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- โหลด Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- ฟอนต์ภาษาไทย -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ชุด SVG Icons (แทนที่ lucide-react เพื่อให้รันในไฟล์เดียวได้) ---
        const Network = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/></svg>;
        const RefreshCw = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const Play = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const Settings = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
        const Database = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>;
        const Lightbulb = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>;
        const ListChecks = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></svg>;
        const ShoppingCart = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>;
        const CheckCircle2 = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const XCircle = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>;
        const ArrowRight = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;

        const ITEMS = ['นม', 'ขนมปัง', 'เนย', 'แยม', 'ไข่'];

        // --- Helper Functions สำหรับ Algorithm ---
        const getCombinations = (array, size) => {
            const result = [];
            const p = (t, i) => {
                if (t.length === size) {
                    result.push(t);
                    return;
                }
                if (i + 1 > array.length) {
                    return;
                }
                p([...t, array[i]], i + 1);
                p(t, i + 1);
            };
            p([], 0);
            return result;
        };

        const roundHalfUp = (n, decimals = 2) => {
            const multiplier = Math.pow(10, decimals);
            return Math.floor(n * multiplier + 0.5) / multiplier;
        };

        function App() {
            const [numTx, setNumTx] = useState(10);
            const [matrix, setMatrix] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [minSup, setMinSup] = useState(0.3);
            const [minConf, setMinConf] = useState(0.5);
            
            const [activeTab, setActiveTab] = useState('data');
            const [analysisSteps, setAnalysisSteps] = useState([]);
            const [frequentItemsets, setFrequentItemsets] = useState({});
            const [associationRules, setAssociationRules] = useState([]);
            const [isAnalyzing, setIsAnalyzing] = useState(false);

            // สถานะสำหรับ Quiz
            const [quiz, setQuiz] = useState(null);
            const [userAnswer, setUserAnswer] = useState('');
            const [quizFeedback, setQuizFeedback] = useState(null);

            const generateData = () => {
                const txCount = Math.floor(Math.random() * 5) + 8;
                setNumTx(txCount);
                
                const newMatrix = [];
                const newTx = [];
                
                for (let i = 0; i < txCount; i++) {
                let row;
                while (true) {
                    row = ITEMS.map(() => (Math.random() > 0.5 ? 1 : 0));
                    if (row.reduce((a, b) => a + b, 0) > 0) break;
                }
                newMatrix.push(row);
                
                const itemsInTx = new Set(ITEMS.filter((_, idx) => row[idx] === 1));
                newTx.push(itemsInTx);
                }
                
                setMatrix(newMatrix);
                setTransactions(newTx);
                setAnalysisSteps([]);
                setAssociationRules([]);
                setFrequentItemsets({});
                
                // รีเซ็ต Quiz เมื่อสุ่มข้อมูลใหม่
                setQuiz(null);
                setUserAnswer('');
                setQuizFeedback(null);
            };

            useEffect(() => {
                generateData();
            }, []);

            const getSupport = (itemsetArray) => {
                let count = 0;
                for (const t of transactions) {
                const isSubset = itemsetArray.every(item => t.has(item));
                if (isSubset) count++;
                }
                return count / transactions.length;
            };

            // ฟังก์ชันสุ่มคำถาม Quiz
            const generateQuiz = () => {
                const validItems = ITEMS.filter(item => getSupport([item]) > 0);
                if (validItems.length < 2) return; // ป้องกันข้อมูลน้อยเกินไป
                
                const shuffled = [...validItems].sort(() => 0.5 - Math.random());
                const A = shuffled[0];
                const B = shuffled[1];

                const qTypes = ['support_1', 'support_2', 'confidence', 'lift'];
                const type = qTypes[Math.floor(Math.random() * qTypes.length)];

                let text = "";
                let actualValue = 0;

                const supA = getSupport([A]);
                const supB = getSupport([B]);
                const supAB = getSupport([A, B]);

                if (type === 'support_1') {
                    text = `ค่า Support ของ {${A}} คือเท่าไหร่?`;
                    actualValue = roundHalfUp(supA, 2);
                } else if (type === 'support_2') {
                    text = `ค่า Support ของ {${A}, ${B}} (ซื้อคู่กัน) คือเท่าไหร่?`;
                    actualValue = roundHalfUp(supAB, 2);
                } else if (type === 'confidence') {
                    text = `ค่า Confidence ของกฎ {${A}} -> {${B}} คือเท่าไหร่?`;
                    actualValue = roundHalfUp(supAB / supA, 2);
                } else if (type === 'lift') {
                    text = `ค่า Lift ของกฎ {${A}} -> {${B}} คือเท่าไหร่?`;
                    const conf = roundHalfUp(supAB / supA, 2);
                    actualValue = roundHalfUp(conf / supB, 2);
                }

                setQuiz({ text, actualValue });
                setUserAnswer('');
                setQuizFeedback(null);
            };

            // ฟังก์ชันตรวจคำตอบ Quiz
            const checkQuizAnswer = () => {
                const ans = parseFloat(userAnswer);
                if (isNaN(ans)) {
                    setQuizFeedback({ status: 'error', message: 'กรุณากรอกตัวเลขทศนิยม' });
                    return;
                }
                if (ans === quiz.actualValue) {
                    setQuizFeedback({ status: 'success', message: `🎉 ถูกต้อง! คำตอบคือ ${quiz.actualValue.toFixed(2)}` });
                } else {
                    setQuizFeedback({ status: 'error', message: `❌ ยังไม่ถูกครับ คำตอบที่ถูกต้องคือ ${quiz.actualValue.toFixed(2)}` });
                }
            };

            const runApriori = () => {
                setIsAnalyzing(true);
                setActiveTab('steps');
                
                setTimeout(() => {
                let k = 1;
                let currentItemsets = ITEMS.map(item => [item]);
                const stepsLog = [];
                const allFreq = {};

                while (currentItemsets.length > 0) {
                    const stepDetail = { k, candidates: [], passed: [], failed: [] };
                    const nextFrequent = [];

                    for (const itemset of currentItemsets) {
                    const supRaw = getSupport(itemset);
                    const sup = roundHalfUp(supRaw, 2);
                    
                    const resultObj = { itemset, support: sup };
                    stepDetail.candidates.push(resultObj);

                    if (sup >= minSup) {
                        stepDetail.passed.push(resultObj);
                        nextFrequent.push(itemset);
                        allFreq[itemset.join(',')] = sup;
                    } else {
                        stepDetail.failed.push(resultObj);
                    }
                    }

                    stepsLog.push(stepDetail);

                    if (nextFrequent.length === 0) break;

                    k++;
                    const validItems = new Set();
                    nextFrequent.forEach(itemset => itemset.forEach(item => validItems.add(item)));
                    
                    const validItemsArr = Array.from(validItems);
                    currentItemsets = getCombinations(validItemsArr, k);
                    
                    currentItemsets = currentItemsets.filter(candidate => {
                    const sub = getCombinations(candidate, k-1);
                    return sub.every(s => nextFrequent.some(nf => nf.join(',') === s.join(',')));
                    });
                }

                setAnalysisSteps(stepsLog);
                setFrequentItemsets(allFreq);

                const rules = [];
                Object.keys(allFreq).forEach(itemsetStr => {
                    const items = itemsetStr.split(',');
                    if (items.length < 2) return;

                    const supportXY = allFreq[itemsetStr];

                    for (let i = 1; i < items.length; i++) {
                    const antecedentsList = getCombinations(items, i);
                    
                    antecedentsList.forEach(antecedent => {
                        const consequent = items.filter(x => !antecedent.includes(x));
                        
                        const supportX = getSupport(antecedent);
                        const supportY = getSupport(consequent);
                        
                        const confidence = roundHalfUp(supportXY / supportX, 2);
                        const lift = roundHalfUp(confidence / supportY, 2);

                        if (confidence >= minConf) {
                        rules.push({
                            antecedent,
                            consequent,
                            support: roundHalfUp(supportXY, 2),
                            confidence,
                            lift
                        });
                        }
                    });
                    }
                });
                
                const uniqueRules = rules.reduce((acc, current) => {
                    const x = acc.find(item => item.antecedent.join(',') === current.antecedent.join(',') && item.consequent.join(',') === current.consequent.join(','));
                    if (!x) { return acc.concat([current]); } else { return acc; }
                }, []);
                
                setAssociationRules(uniqueRules.sort((a, b) => b.lift - a.lift));
                setIsAnalyzing(false);
                }, 500);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                <div className="max-w-6xl mx-auto space-y-6">
                    
                    {/* Header */}
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
                    <div>
                        <h1 className="text-2xl font-bold text-indigo-700 flex items-center gap-2">
                        <Network className="w-8 h-8" />
                        Apriori Algorithm Dashboard
                        </h1>
                        <p className="text-slate-500 mt-1">ระบบจำลองการหาความสัมพันธ์สินค้าแบบโต้ตอบ</p>
                    </div>
                    <div className="flex gap-2">
                        <button 
                        onClick={generateData}
                        className="flex items-center gap-2 px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg font-medium transition-colors"
                        >
                        <RefreshCw className="w-4 h-4" /> สุ่มข้อมูลใหม่
                        </button>
                        <button 
                        onClick={runApriori}
                        disabled={isAnalyzing}
                        className="flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium shadow-sm transition-colors disabled:opacity-50"
                        >
                        {isAnalyzing ? <RefreshCw className="w-4 h-4 animate-spin" /> : <Play className="w-4 h-4" />}
                        เริ่มวิเคราะห์
                        </button>
                    </div>
                    </div>

                    {/* Configurations */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <h3 className="font-semibold flex items-center gap-2 mb-4 text-slate-700">
                        <Settings className="w-5 h-5 text-indigo-500" />
                        ตั้งค่าพารามิเตอร์ (Parameters)
                        </h3>
                        
                        <div className="space-y-6">
                        <div>
                            <div className="flex justify-between mb-1">
                            <label className="text-sm font-medium text-slate-600">Minimum Support (minsup)</label>
                            <span className="text-sm font-bold text-indigo-600">{minSup.toFixed(2)} ({(minSup*100).toFixed(0)}%)</span>
                            </div>
                            <input 
                            type="range" min="0.1" max="1.0" step="0.05" 
                            value={minSup} onChange={(e) => setMinSup(parseFloat(e.target.value))}
                            className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                            />
                            <p className="text-xs text-slate-400 mt-1">ความถี่ขั้นต่ำที่กลุ่มสินค้าต้องปรากฏร่วมกัน</p>
                        </div>

                        <div>
                            <div className="flex justify-between mb-1">
                            <label className="text-sm font-medium text-slate-600">Minimum Confidence (minconf)</label>
                            <span className="text-sm font-bold text-teal-600">{minConf.toFixed(2)} ({(minConf*100).toFixed(0)}%)</span>
                            </div>
                            <input 
                            type="range" min="0.1" max="1.0" step="0.05" 
                            value={minConf} onChange={(e) => setMinConf(parseFloat(e.target.value))}
                            className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-teal-500"
                            />
                            <p className="text-xs text-slate-400 mt-1">ความน่าจะเป็นที่จะซื้อสินค้า B เมื่อซื้อสินค้า A ไปแล้ว</p>
                        </div>
                        </div>
                    </div>

                    <div className="bg-indigo-50 p-6 rounded-2xl shadow-sm border border-indigo-100 flex flex-col justify-center">
                        <h3 className="font-semibold text-indigo-800 mb-2">สรุปจำนวนข้อมูล</h3>
                        <div className="flex items-end gap-2">
                        <span className="text-5xl font-black text-indigo-600">{numTx}</span>
                        <span className="text-indigo-400 font-medium mb-1">Transactions</span>
                        </div>
                        <p className="text-sm text-indigo-600/80 mt-2">
                        ระบบสุ่มข้อมูลแบบ 0 (ไม่ซื้อ) / 1 (ซื้อ) จำนวน {numTx} ตะกร้า โดยมีสินค้าทั้งหมด {ITEMS.length} ชนิด
                        </p>
                    </div>
                    </div>

                    {/* Tabs */}
                    <div className="flex space-x-1 bg-white p-1 rounded-xl shadow-sm border border-slate-100">
                    <button
                        onClick={() => setActiveTab('data')}
                        className={`flex-1 py-2.5 text-sm font-medium rounded-lg flex items-center justify-center gap-2 transition-all ${activeTab === 'data' ? 'bg-indigo-50 text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-50'}`}
                    >
                        <Database className="w-4 h-4" /> ข้อมูลดิบ (Raw Data)
                    </button>
                    <button
                        onClick={() => setActiveTab('steps')}
                        className={`flex-1 py-2.5 text-sm font-medium rounded-lg flex items-center justify-center gap-2 transition-all ${activeTab === 'steps' ? 'bg-indigo-50 text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-50'}`}
                    >
                        <ListChecks className="w-4 h-4" /> ขั้นตอนการคัดกรอง (Pruning)
                    </button>
                    <button
                        onClick={() => setActiveTab('rules')}
                        className={`flex-1 py-2.5 text-sm font-medium rounded-lg flex items-center justify-center gap-2 transition-all ${activeTab === 'rules' ? 'bg-indigo-50 text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-50'}`}
                    >
                        <ShoppingCart className="w-4 h-4" /> กฎความสัมพันธ์ (Rules)
                    </button>
                    </div>

                    {/* Tab Content */}
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 min-h-[400px]">
                    
                    {/* Data Tab */}
                    {activeTab === 'data' && (
                        <div className="space-y-6">
                            
                            {/* ส่วนของ Quiz ทดสอบความเข้าใจ */}
                            <div className="bg-amber-50 border border-amber-200 rounded-xl p-5 shadow-sm">
                                <div className="flex justify-between items-start mb-4">
                                    <div className="flex items-center gap-2">
                                        <Lightbulb className="w-6 h-6 text-amber-500" />
                                        <h3 className="font-bold text-amber-800 text-lg">ทดสอบความเข้าใจ (Quiz)</h3>
                                    </div>
                                    <button 
                                        onClick={generateQuiz}
                                        className="px-4 py-2 bg-amber-100 hover:bg-amber-200 text-amber-800 rounded-lg text-sm font-semibold transition-colors shadow-sm"
                                    >
                                        สุ่มคำถามใหม่
                                    </button>
                                </div>
                                
                                {!quiz ? (
                                    <p className="text-amber-700/70 text-sm">กดปุ่ม "สุ่มคำถามใหม่" เพื่อลองคำนวณค่า Support, Confidence, Lift จากข้อมูลด้านล่าง</p>
                                ) : (
                                    <div className="space-y-4">
                                        <p className="font-medium text-amber-900 text-lg">
                                            {quiz.text} 
                                            <span className="text-sm font-normal text-amber-600 ml-2">(ทศนิยม 2 ตำแหน่ง)</span>
                                        </p>
                                        <div className="flex flex-wrap gap-2">
                                            <input 
                                                type="number" 
                                                step="0.01"
                                                value={userAnswer}
                                                onChange={(e) => setUserAnswer(e.target.value)}
                                                onKeyDown={(e) => e.key === 'Enter' && checkQuizAnswer()}
                                                placeholder="0.00"
                                                className="px-4 py-2 border border-amber-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 w-32 bg-white"
                                            />
                                            <button 
                                                onClick={checkQuizAnswer}
                                                className="px-6 py-2 bg-amber-500 hover:bg-amber-600 text-white rounded-lg font-semibold transition-colors shadow-sm"
                                            >
                                                ส่งคำตอบ
                                            </button>
                                        </div>
                                        {quizFeedback && (
                                            <div className={`p-3 rounded-lg text-sm font-medium border ${quizFeedback.status === 'success' ? 'bg-emerald-50 text-emerald-800 border-emerald-200' : 'bg-rose-50 text-rose-800 border-rose-200'}`}>
                                                {quizFeedback.message}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>

                            <div className="overflow-x-auto border border-slate-200 rounded-xl">
                                <table className="w-full text-left text-sm text-slate-600">
                                    <thead className="text-xs uppercase bg-slate-50 text-slate-500 border-b border-slate-200">
                                    <tr>
                                        <th className="px-6 py-4 font-semibold">Transaction</th>
                                        {ITEMS.map(item => (
                                        <th key={item} className="px-6 py-4 font-semibold text-center">{item}</th>
                                        ))}
                                    </tr>
                                    </thead>
                                    <tbody>
                                    {matrix.map((row, idx) => (
                                        <tr key={idx} className="border-b border-slate-100 hover:bg-slate-50/50">
                                        <td className="px-6 py-3 font-medium text-slate-700">T{idx + 1}</td>
                                        {row.map((val, i) => (
                                            <td key={i} className="px-6 py-3 text-center">
                                            {val === 1 
                                                ? <span className="inline-flex items-center justify-center w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 font-bold text-xs">1</span> 
                                                : <span className="text-slate-300">0</span>
                                            }
                                            </td>
                                        ))}
                                        </tr>
                                    ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* Steps Tab */}
                    {activeTab === 'steps' && (
                        <div>
                        {analysisSteps.length === 0 ? (
                            <div className="text-center py-20 text-slate-400">
                            <ListChecks className="w-12 h-12 mx-auto mb-3 opacity-20" />
                            <p>กดปุ่ม "เริ่มวิเคราะห์" เพื่อดูขั้นตอนการทำงาน</p>
                            </div>
                        ) : (
                            <div className="space-y-8">
                            {analysisSteps.map((step) => (
                                <div key={step.k} className="border border-slate-200 rounded-xl overflow-hidden">
                                <div className="bg-slate-50 px-4 py-3 border-b border-slate-200">
                                    <h4 className="font-bold text-slate-700">รอบที่ {step.k}: ตรวจสอบกลุ่มสินค้า {step.k} ชิ้น ({step.k}-Itemsets)</h4>
                                </div>
                                <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {/* Passed */}
                                    <div>
                                    <div className="flex items-center gap-2 mb-3 text-emerald-600 font-medium text-sm">
                                        <CheckCircle2 className="w-4 h-4" /> ผ่านเกณฑ์ (Support &gt;= {minSup})
                                    </div>
                                    <div className="space-y-2">
                                        {step.passed.length > 0 ? step.passed.map((p, i) => (
                                        <div key={i} className="flex justify-between items-center bg-emerald-50 border border-emerald-100 px-3 py-2 rounded-lg text-sm">
                                            <span className="font-medium text-emerald-800">{"{" + p.itemset.join(', ') + "}"}</span>
                                            <span className="bg-white px-2 py-1 rounded text-emerald-600 font-bold text-xs shadow-sm">
                                            Sup: {p.support.toFixed(2)}
                                            </span>
                                        </div>
                                        )) : <p className="text-xs text-slate-400 italic">ไม่มีกลุ่มสินค้าผ่านเกณฑ์</p>}
                                    </div>
                                    </div>
                                    {/* Failed */}
                                    <div>
                                    <div className="flex items-center gap-2 mb-3 text-rose-500 font-medium text-sm">
                                        <XCircle className="w-4 h-4" /> ถูกคัดออก (Support &lt; {minSup})
                                    </div>
                                    <div className="space-y-2">
                                        {step.failed.length > 0 ? step.failed.map((f, i) => (
                                        <div key={i} className="flex justify-between items-center bg-rose-50 border border-rose-100 px-3 py-2 rounded-lg text-sm">
                                            <span className="text-rose-700">{"{" + f.itemset.join(', ') + "}"}</span>
                                            <span className="bg-white px-2 py-1 rounded text-rose-500 font-medium text-xs opacity-80">
                                            Sup: {f.support.toFixed(2)}
                                            </span>
                                        </div>
                                        )) : <p className="text-xs text-slate-400 italic">ไม่มีกลุ่มสินค้าถูกคัดออก</p>}
                                    </div>
                                    </div>
                                </div>
                                </div>
                            ))}
                            </div>
                        )}
                        </div>
                    )}

                    {/* Rules Tab */}
                    {activeTab === 'rules' && (
                        <div>
                        {analysisSteps.length === 0 ? (
                            <div className="text-center py-20 text-slate-400">
                            <Network className="w-12 h-12 mx-auto mb-3 opacity-20" />
                            <p>กดปุ่ม "เริ่มวิเคราะห์" เพื่อสร้างกฎความสัมพันธ์</p>
                            </div>
                        ) : associationRules.length === 0 ? (
                            <div className="text-center py-20 bg-amber-50 rounded-xl border border-amber-100 text-amber-600">
                            <p className="font-medium">ไม่พบกฎที่ผ่านเกณฑ์</p>
                            <p className="text-sm mt-1 opacity-80">ลองปรับลดค่า minsup หรือ minconf ลงเพื่อค้นหาความสัมพันธ์ที่ซ่อนอยู่</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                            {associationRules.map((rule, idx) => (
                                <div key={idx} className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm hover:shadow-md transition-shadow relative overflow-hidden">
                                
                                <div className={`absolute top-0 left-0 w-1.5 h-full ${rule.lift > 1.2 ? 'bg-emerald-500' : rule.lift >= 1 ? 'bg-amber-400' : 'bg-rose-400'}`}></div>
                                
                                <div className="flex items-center justify-between mb-4 pl-3">
                                    <div className="flex items-center gap-3">
                                    <span className="px-3 py-1.5 bg-indigo-50 text-indigo-700 font-semibold rounded-lg text-sm border border-indigo-100">
                                        {rule.antecedent.join(', ')}
                                    </span>
                                    <ArrowRight className="w-4 h-4 text-slate-400" />
                                    <span className="px-3 py-1.5 bg-teal-50 text-teal-700 font-semibold rounded-lg text-sm border border-teal-100">
                                        {rule.consequent.join(', ')}
                                    </span>
                                    </div>
                                </div>
                                
                                <div className="grid grid-cols-3 gap-2 pl-3">
                                    <div className="bg-slate-50 rounded-lg p-2 text-center border border-slate-100">
                                    <p className="text-[10px] uppercase text-slate-400 font-semibold">Support</p>
                                    <p className="text-lg font-bold text-slate-700">{rule.support.toFixed(2)}</p>
                                    </div>
                                    <div className="bg-slate-50 rounded-lg p-2 text-center border border-slate-100">
                                    <p className="text-[10px] uppercase text-slate-400 font-semibold">Confidence</p>
                                    <p className="text-lg font-bold text-teal-600">{rule.confidence.toFixed(2)}</p>
                                    </div>
                                    <div className={`rounded-lg p-2 text-center border ${rule.lift > 1 ? 'bg-emerald-50 border-emerald-100' : 'bg-slate-50 border-slate-100'}`}>
                                    <p className="text-[10px] uppercase text-slate-400 font-semibold">Lift</p>
                                    <p className={`text-lg font-bold ${rule.lift > 1 ? 'text-emerald-600' : 'text-slate-600'}`}>{rule.lift.toFixed(2)}</p>
                                    </div>
                                </div>

                                <div className="pl-3 mt-3 text-xs text-slate-500 bg-slate-50 p-2 rounded">
                                    <span className="font-semibold">ความหมาย: </span>
                                    ถ้าลูกค้าซื้อ <span className="text-indigo-600">[{rule.antecedent.join(', ')}]</span> 
                                    จะมีโอกาสซื้อ <span className="text-teal-600">[{rule.consequent.join(', ')}]</span> ถึง <span className="font-bold">{(rule.confidence * 100).toFixed(0)}%</span> 
                                    {rule.lift > 1 && <span> (ช่วยกระตุ้นยอดขายได้ {rule.lift.toFixed(1)} เท่า)</span>}
                                </div>
                                </div>
                            ))}
                            </div>
                        )}
                        </div>
                    )}
                    </div>
                </div>
                </div>
            );
        }

        // --- Render the App ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
